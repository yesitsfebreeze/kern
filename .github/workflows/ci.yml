name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # `just check` is the only definition of this repo's formatting and lint bar.
  # CI runs the recipe rather than copies of its command lines so the two
  # cannot drift.
  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: extractions/setup-just@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lint-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-lint-cargo-
      - name: Static checks (just check)
        run: just check

  # tests/e2e/ is the only cover for the hub lifecycle and the instrument retrieval
  # quality is measured with, so it gates merges like the unit tests do.
  # Linux only: tests/e2e/test_hub.py:13 skips the whole hub module on win32 (unix
  # sockets), so a Windows e2e job would report green on nothing.
  e2e:
    name: e2e (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: extractions/setup-just@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-e2e-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-e2e-cargo-
      - name: Install harness deps (just e2e-install)
        run: just e2e-install
      # conftest.py builds the binary itself; building here warms the cache
      # above and keeps a compile failure out of the pytest report.
      - name: Build kern
        run: cargo build --bin kern --locked
      - name: E2E (just e2e)
        run: just e2e

  # Full build + test on the three native runner archs (tests actually execute).
  test:
    name: test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-
      - name: Build (workspace)
        run: cargo build --workspace --locked
      - name: Test (workspace)
        run: cargo test --workspace --locked

  # Cross-compile the kern binary for the widest target set we can. Build-only:
  # non-native targets can't run tests on the runner, but a green build proves
  # the code compiles everywhere. fail-fast:false so one exotic target failing
  # doesn't mask the rest.
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux (glibc + musl, multiple archs) ----
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl }
          - { os: ubuntu-latest, target: armv7-unknown-linux-gnueabihf }
          - { os: ubuntu-latest, target: arm-unknown-linux-gnueabihf }
          - { os: ubuntu-latest, target: riscv64gc-unknown-linux-gnu }
          - { os: ubuntu-latest, target: powerpc64le-unknown-linux-gnu }
          - { os: ubuntu-latest, target: s390x-unknown-linux-gnu }
          # ---- macOS (Intel + Apple Silicon) ----
          - { os: macos-13, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          # ---- Windows (msvc + gnu, multiple archs) ----
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
          - { os: windows-latest, target: aarch64-pc-windows-msvc }
          - { os: windows-latest, target: i686-pc-windows-msvc }
          - { os: windows-latest, target: x86_64-pc-windows-gnu }
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.target }}
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--release --bin kern --locked"

  # The 2026-07-17 intake rename scrubbed a print-queue-style working name from
  # the tree "with no alias kept anywhere". It drifted back into three prose
  # files anyway, so the ban is enforced instead of remembered.
  vocab:
    name: banned vocabulary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Never branch on grep's exit code across these paths: GNU grep returns 2
      # for a missing path EVEN WHEN IT MATCHED, and `.splinter` is gitignored,
      # so the old `if grep …` could never fire on a runner. Test the output.
      - name: No scrubbed synonyms for the intake
        run: |
          hits=$(grep -rniE 's''pool' src docs tests README.md || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::banned word: the intake is called the intake"
            exit 1
          fi
