# Project-scope kern config. Merges over the user-scope kern.toml.
# (Layered parsing now handles leading comments + [section] headers.)

[embed]
# Embedding model. MUST match the dimension of the stored vectors — changing it
# requires `kern reembed` (with the daemon stopped) to re-embed the whole graph,
# else every cosine degenerates. This graph was migrated to qwen3-embedding via
# `kern reembed`.
url = "http://localhost:11434"
model = "qwen3-embedding:0.6b"

[reason]
# Model for distillation + smart-split + edge proposal (background capture).
# Latency-insensitive, structured-output-sensitive → keep the bigger model.
# qwen2.5:7b — most reliable small model for formatted extraction.
url = "http://localhost:11434"
model = "qwen2.5:7b"

[answer]
# Model for the user-facing /ask oracle (streamed answer in the viewer).
# Latency-critical, only glues retrieved graph nodes into prose → smallest model
# that clears the grounding floor. qwen3.5:4b: fits 8 GB VRAM beside the 0.6b
# embedder, same family. url/key blank → fall back to [reason]'s endpoint.
model = "qwen3.5:4b"

[capture]
# Self-learning: capture Claude Code sessions -> distill -> graph -> digest.
enabled = true

[tick]
# Self-compaction cadence (heat decay + stigmergy GC + clustering).
# 0 disables the autonomous driver.
interval_secs = 60

[gossip]
# Self-distribution. OFF by default. Set enabled=true on two+ nodes sharing
# a network id to federate over LAN (discovery auto-peers same-network kerns).
enabled = false
addr = "0.0.0.0:7400"
discovery = true
discovery_port = 7475
peers = []
