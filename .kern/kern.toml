# Project-scope kern config. Merges over the user-scope kern.toml.
# (Layered parsing now handles leading comments + [section] headers.)

[embed]
# Embedding model. MUST match the dimension of the stored vectors — changing it
# requires `kern reembed` (with the daemon stopped) to re-embed the whole graph,
# else every cosine degenerates. This graph was migrated to qwen3-embedding via
# `kern reembed`.
url = "http://localhost:11434"
model = "qwen3-embedding:0.6b"

[reason]
# Model for distillation + smart-split + edge proposal. Local Ollama.
# qwen2.5:7b — small, fast, and the most reliable small model for structured
# extraction / formatted output, which is what distillation needs.
url = "http://localhost:11434"
model = "qwen2.5:7b"

[capture]
# Self-learning: capture Claude Code sessions -> distill -> graph -> digest.
enabled = true

[tick]
# Self-compaction cadence (heat decay + stigmergy GC + clustering).
# 0 disables the autonomous driver.
interval_secs = 60

[gossip]
# Self-distribution. OFF by default. Set enabled=true on two+ nodes sharing
# a network id to federate over LAN (discovery auto-peers same-network kerns).
enabled = false
addr = "0.0.0.0:7400"
discovery = true
discovery_port = 7475
peers = []
