[book]
title = "Kern"
authors = ["kern contributors"]
language = "en"
src = "src"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/yesitsfebreeze/kern"
edit-url-template = "https://github.com/yesitsfebreeze/kern/edit/master/docs/book/{path}"
additional-css = ["theme/custom.css"]
additional-js = ["theme/custom.js", "mermaid.min.js", "mermaid-init.js"]
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 3

[output.html.fold]
enable = true
level = 1

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
