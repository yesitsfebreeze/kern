# kern — memory that maintains itself

A self-learning memory daemon for AI agents. It captures durable facts from
your sessions, forgets what goes stale, and serves the right context back —
on its own.

    capture daemon ........................... ONLINE
    stigmergy GC ............................. ACTIVE
    LAN federation ........................... STANDBY


## what it does

  01  SELF-LEARNING       a Stop hook distills sessions into typed claims — no indexing job
  02  STRUCTURED          a graph of facts + reason edges, not a flat bag of vectors
  03  SELF-COMPACTING     heat decays, cold thoughts evict — facts are immune, stays small
  04  SELF-DISTRIBUTING   content-addressed CRDT over LAN gossip, no coordinator · opt-in

RAG is search you maintain.  kern is memory that maintains itself.


## quickstart   // node.js + local ollama

**copy!**
$ curl -fsSL https://raw.githubusercontent.com/yesitsfebreeze/kern/master/install.sh | sh
$ claude mcp add kern -- kern mcp
$ /plugin marketplace add yesitsfebreeze/kern
$ /plugin install kern@kern

Capture is off by default — flip `[capture] enabled = true` in `.kern/kern.toml`
per project. Full setup in the README.


## links

  repo     https://github.com/yesitsfebreeze/kern
  docs     https://github.com/yesitsfebreeze/kern#using-it
  vision   https://github.com/yesitsfebreeze/kern/blob/master/docs/vision.md


## stop re-teaching your agent.

kern v1.0.0 · MIT · RUST · NO EXTERNAL VECTOR DB

<script>
/* ── render the markdown source read-only ── */
(function () {
  var src = document.getElementById('src').textContent.replace(/^\n/, '');
  var cm = CodeMirror(document.getElementById('editor'), {
    value: src,
    mode: 'markdown',
    theme: 'kern',
    lineNumbers: true,
    lineWrapping: true,
    readOnly: true,            // native cursor, selection & copy — just no editing
    cursorBlinkRate: 0,        // disable CM's hard blink; we fade via CSS
    viewportMargin: Infinity
  });

  var scroller = cm.getScrollerElement();

  // relative line numbers: the cursor's line shows its absolute number, the rest
  // show their distance from it (vim relativenumber). Re-rendered on every move.
  function relNum(n) {
    var d = (n - 1) - cm.getCursor().line;
    return d === 0 ? String(n) : String(Math.abs(d));
  }
  cm.setOption('lineNumberFormatter', relNum);

  // smooth scroll that keeps the cursor line vertically centred
  function easeOut(p) { return 1 - Math.pow(1 - p, 3); }
  var raf = null, tFrom, tTo, tStart, tDur;
  function step(ts) {
    var p = tDur <= 0 ? 1 : Math.min(1, (ts - tStart) / tDur);
    scroller.scrollTop = tFrom + (tTo - tFrom) * easeOut(p);
    raf = p < 1 ? requestAnimationFrame(step) : null;
  }
  function centerTarget() {
    var c = cm.cursorCoords(null, 'local');
    return (c.top + c.bottom) / 2 - scroller.clientHeight / 2;
  }
  function center(animate) {
    var to = centerTarget();
    if (!animate) { if (raf) cancelAnimationFrame(raf), raf = null; scroller.scrollTop = to; return; }
    tFrom = scroller.scrollTop; tTo = to; tStart = performance.now();
    tDur = Math.min(420, 90 + Math.abs(to - tFrom) * 0.4);
    if (!raf) raf = requestAnimationFrame(step);
  }

  // keep the block cursor solid while navigating; resume the fade after idle
  var wakeT = null;
  function wake() {
    document.body.classList.add('cursor-moving');
    clearTimeout(wakeT);
    wakeT = setTimeout(function () { document.body.classList.remove('cursor-moving'); }, 380);
  }

  // mouse wheel → move the cursor up/down a line (like arrow keys); the view
  // then re-centres on it. Cooldown keeps trackpad momentum to one line at a time.
  var wlock = false;
  document.getElementById('editor').addEventListener('wheel', function (e) {
    e.preventDefault();
    if (wlock) return;
    wlock = true;
    cm.execCommand(e.deltaY > 0 ? 'goLineDown' : 'goLineUp');
    setTimeout(function () { wlock = false; }, 60);
  }, { passive: false });

  // recolour the single character under the cursor so it phases with the block
  var curMark = null;
  function markChar() {
    if (curMark) { curMark.clear(); curMark = null; }
    var c = cm.getCursor();
    if (c.ch < (cm.getLine(c.line) || '').length) {
      curMark = cm.markText({ line: c.line, ch: c.ch }, { line: c.line, ch: c.ch + 1 }, { className: 'cur-char' });
    }
  }

  cm.on('cursorActivity', function () {
    cm.setOption('lineNumberFormatter', relNum);   // refresh relative numbers
    markChar();
    wake();
    if (history.replaceState) history.replaceState(null, '', '#' + (cm.getCursor().line + 1));
    if (cm.somethingSelected()) return;            // don't yank the view while selecting
    center(true);
  });

  // links: click a URL, or press "f" to open the one under the cursor (new tab)
  function urlAt(pos) {
    var line = cm.getLine(pos.line) || '';
    var re = /https?:\/\/[^\s)]+/g, m;
    while ((m = re.exec(line))) {
      if (pos.ch >= m.index && pos.ch <= m.index + m[0].length) return m[0];
    }
    return null;
  }
  function openUrl(u) { if (u) window.open(u, '_blank', 'noopener'); }

  cm.getWrapperElement().addEventListener('click', function (e) {
    if (cm.somethingSelected()) return;                 // a drag-select shouldn't open
    openUrl(urlAt(cm.coordsChar({ left: e.clientX, top: e.clientY })));
  });
  window.addEventListener('keydown', function (e) {
    if (e.key === 'f' && !e.metaKey && !e.ctrlKey && !e.altKey) {
      var u = urlAt(cm.getCursor());
      if (u) { e.preventDefault(); openUrl(u); }
    }
  });

  window.addEventListener('resize', function () { center(false); });

  // deep-link (url#11) + first paint
  var hash = location.hash.slice(1);
  if (/^\d+$/.test(hash)) cm.setCursor({ line: Math.max(0, Math.min(cm.lineCount() - 1, +hash - 1)), ch: 0 });
  cm.setOption('lineNumberFormatter', relNum);
  markChar();
  cm.focus();
  center(false);
})();
</script>

<script>
/* ── CRT post-process glow over the page (WebGL, additive, screen-blended) ── */
(function () {
  var canvas = document.getElementById('crt');
  var toggle = document.getElementById('crt-toggle');
  if (!canvas) return;

  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var on = true, raf = null;
  var DPR = Math.min(window.devicePixelRatio || 1, 1.5);

  var gl = canvas.getContext('webgl', { premultipliedAlpha: false, alpha: true })
        || canvas.getContext('experimental-webgl', { premultipliedAlpha: false, alpha: true });

  var VERT = 'attribute vec2 p; void main(){ gl_Position = vec4(p,0.0,1.0); }';
  var FRAG = [
    'precision mediump float;',
    'uniform vec2 u_res;',
    'uniform float u_time;',
    'float hash(vec2 v){ return fract(sin(dot(v, vec2(12.9898,78.233))) * 43758.5453); }',
    'void main(){',
    '  vec2 uv = gl_FragCoord.xy / u_res;',
    '  vec2 c = uv * 2.0 - 1.0;',
    '  float r2 = dot(c, c);',
    '  vec2 b = c * (1.0 + 0.05 * r2);',
    '  vec2 cuv = b * 0.5 + 0.5;',
    '  float center = 1.0 - smoothstep(0.1, 1.6, length(b));',
    '  float curvedY = cuv.y * u_res.y;',
    '  float scan = 0.5 + 0.5 * sin(curvedY * 1.5 - u_time * 1.2);',
    '  float roll = fract(cuv.y - u_time * 0.05);',
    '  float band = smoothstep(0.0, 0.06, roll) * (1.0 - smoothstep(0.06, 0.2, roll));',
    '  float n = hash(floor(gl_FragCoord.xy) + fract(u_time));',
    '  vec3 phos = vec3(0.30, 1.0, 0.50);',
    '  float emit = pow(scan, 2.0) * 0.05',
    '              + center * 0.035',
    '              + band * 0.10',
    '              + (n - 0.5) * 0.02',
    '              + (0.5 + 0.5 * sin(u_time * 6.0)) * 0.006;',
    '  vec3 col = phos * max(emit, 0.0);',
    '  col *= 1.0 - 0.6 * smoothstep(0.9, 1.5, length(b));',
    '  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);',
    '}'
  ].join('\n');

  var prog, uRes, uTime, useGL = false, ctx2d = null;

  function compile(type, src) {
    var s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    return gl.getShaderParameter(s, gl.COMPILE_STATUS) ? s : null;
  }
  function initGL() {
    if (!gl) return false;
    var vs = compile(gl.VERTEX_SHADER, VERT), fs = compile(gl.FRAGMENT_SHADER, FRAG);
    if (!vs || !fs) return false;
    prog = gl.createProgram();
    gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return false;
    gl.useProgram(prog);
    var buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
    var loc = gl.getAttribLocation(prog, 'p');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE, gl.ONE);
    uRes = gl.getUniformLocation(prog, 'u_res');
    uTime = gl.getUniformLocation(prog, 'u_time');
    return true;
  }
  function init2D() { ctx2d = canvas.getContext('2d'); return !!ctx2d; }
  function draw2D() {
    var w = canvas.width, h = canvas.height;
    ctx2d.clearRect(0, 0, w, h);
    ctx2d.globalCompositeOperation = 'lighter';
    ctx2d.fillStyle = 'rgba(20,90,45,0.14)';
    for (var y = 0; y < h; y += 3 * DPR) ctx2d.fillRect(0, y, w, 1.2 * DPR);
    var g = ctx2d.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.6);
    g.addColorStop(0, 'rgba(30,110,55,0.04)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx2d.fillStyle = g; ctx2d.fillRect(0, 0, w, h);
    ctx2d.globalCompositeOperation = 'source-over';
  }

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 1.5);
    canvas.width = Math.floor(window.innerWidth * DPR);
    canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    if (useGL) gl.viewport(0, 0, canvas.width, canvas.height);
    else if (ctx2d) draw2D();
  }
  function paint(time) {
    gl.clearColor(0, 0, 0, 1);   // opaque black base; screen-blend drops the black
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, time);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  var startT = 0;
  function frame(t) { if (!startT) startT = t; paint((t - startT) / 1000); raf = requestAnimationFrame(frame); }
  function play() {
    if (!on) return;
    if (useGL) { if (reduce) paint(0); else { cancelAnimationFrame(raf); startT = 0; raf = requestAnimationFrame(frame); } }
    else if (ctx2d) draw2D();
  }
  function stop() { cancelAnimationFrame(raf); }

  useGL = initGL();
  if (!useGL) init2D();
  resize();
  play();
  window.addEventListener('resize', resize);

  if (toggle) {
    toggle.addEventListener('click', function () {
      on = !on;
      document.body.classList.toggle('no-crt', !on);
      toggle.textContent = 'crt:' + (on ? 'on' : 'off');
      toggle.setAttribute('aria-pressed', String(on));
      if (on) { resize(); play(); } else { stop(); }
    });
  }
})();
</script>
